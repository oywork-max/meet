<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLIVE Meeting Room</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #f9f9f7;
            --bg-card: #ffffff;
            --text-primary: #222222;
            --text-secondary: #666666;
            --color-olive: #8a9a5b;
            --color-olive-dark: #6e7f46;
            --color-coral: #f37321;
            --border-color: #e5e5e0;
            --input-bg: #f4f4f0;
        }

        [data-theme="dark"] {
            --bg-primary: #121210;
            --bg-card: #1e1e1b;
            --text-primary: #f5f5f0;
            --text-secondary: #b0b0a8;
            --color-olive: #a2b774;
            --color-coral: #ff8838;
            --border-color: #333330;
            --input-bg: #2a2a27;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-primary); 
            padding: 12px 12px 20px; 
            max-width: 600px; 
            margin: 0 auto; 
            min-height: 100vh;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 1.3rem; color: var(--color-olive); font-weight: 800; }
        h1 span { color: var(--color-coral); }

        .step-indicator { display: flex; gap: 4px; margin-bottom: 12px; width: 100%; }
        .step-bar { flex: 1; height: 5px; background: var(--border-color); border-radius: 4px; }
        .step-bar.active { background: var(--color-olive); }

        .card { background: var(--bg-card); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; }
        h2 { font-size: 1rem; margin-bottom: 10px; border-left: 4px solid var(--color-olive); padding-left: 6px; }

        .form-group { margin-bottom: 8px; width: 100%; display: flex; flex-direction: column; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600; }
        
        input, select, textarea { 
            width: 100% !important; 
            max-width: 100% !important;
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: var(--input-bg); 
            color: var(--text-primary); 
            font-size: 0.95rem; 
            outline: none;
            resize: none;
        }
        
        input[type="datetime-local"] {
            display: block;
            min-width: 0 !important;
            flex: 1;
            box-sizing: border-box !important;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .btn-primary { background: var(--color-olive); color: white; }
        .btn-accent { background: var(--color-coral); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-small { width: auto; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; flex-shrink: 0; }

        .list-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 20px; }
        
        /* [수정] 드래그 가능 아이템들에 스타일 가이드 적용 */
        .tag-item { background: var(--input-bg); padding: 4px 10px; border-radius: 16px; display: flex; align-items: center; gap: 6px; font-size: 0.85rem; border: 1px solid var(--border-color); cursor: grab; user-select: none; transition: opacity 0.2s; }
        .tag-item:active { cursor: grabbing; }
        .tag-item.dragging { opacity: 0.4; background: var(--border-color); }

        .select-item-label { display: flex !important; align-items: center !important; justify-content: flex-start !important; gap: 12px; padding: 14px; background: var(--input-bg); border-radius: 10px; margin-bottom: 8px; cursor: pointer; width: 100%; }
        .select-item-label input[type="checkbox"] { width: 20px !important; height: 20px !important; flex-shrink: 0; accent-color: var(--color-olive); }
        .select-item-label span { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .agenda-write-card { border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-bottom: 12px; background: var(--bg-primary); }
        .agenda-write-card h3 { font-size: 0.95rem; color: var(--color-olive); margin-bottom: 8px; }
        
        /* [수정] 입력 행 드래그 가이드 핸들 및 효과 추가 */
        .line-input-group { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px; background: var(--bg-card); padding: 4px; border-radius: 8px; border: 1px dashed transparent; }
        .line-input-group.dragging { opacity: 0.4; border-color: var(--color-olive); }
        .drag-handle { color: var(--text-secondary); padding: 10px 4px; cursor: grab; font-size: 0.9rem; display: flex; align-items: center; }
        .drag-handle:active { cursor: grabbing; }
        .line-input-group textarea { flex: 1; min-height: 48px; height: auto; padding: 6px 8px; line-height: 1.4; font-size: 0.9rem; }
        .btn-del-line { background: none; border: none; color: var(--text-secondary); padding: 10px 4px; cursor: pointer; }

        .capture-wrapper { background: var(--bg-card); padding: 4px; border-radius: 10px; }
        .result-view { white-space: pre-wrap; background: var(--input-bg); padding: 16px; border-radius: 10px; border: 1px solid var(--border-color); line-height: 1.6; font-size: 0.9rem; color: #222222; }
        
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .mt-10 { margin-top: 10px; }
        .mt-12 { margin-top: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>OLIVE <span>Meeting Room</span></h1>
        <button class="btn-outline btn-small" onclick="toggleTheme()">테마</button>
    </header>

    <div class="step-indicator">
        <div class="step-bar active" id="bar-1"></div>
        <div class="step-bar" id="bar-2"></div>
        <div class="step-bar" id="bar-3"></div>
        <div class="step-bar" id="bar-4"></div>
    </div>

    <!-- [STEP 1] 설정 페이지 -->
    <div id="step-setup">
        <div class="card">
            <h2>기본 정보</h2>
            <div class="form-group">
                <label>회의 제목</label>
                <input type="text" id="meet-title" placeholder="예: 주간 매장 점검 회의">
            </div>
            <div class="form-group">
                <label>회의 일시</label>
                <input type="datetime-local" id="meet-date">
            </div>
        </div>

        <div class="card">
            <h2>참석자 등록 (드래그 순서 변경 가능)</h2>
            <div style="display:flex; gap:6px; width:100%;">
                <input type="text" id="member-input" placeholder="이름 입력 후 엔터" onkeydown="if(event.keyCode==13) addMember()">
                <button class="btn btn-primary btn-small" onclick="addMember()">등록</button>
            </div>
            <div id="member-list" class="list-container"></div>
        </div>

        <div class="card">
            <h2>회의 안건 관리 (드래그 순서 변경 가능)</h2>
            <div style="display:flex; gap:6px; width:100%;">
                <input type="text" id="agenda-input" placeholder="안건 입력 후 엔터" onkeydown="if(event.keyCode==13) addAgenda()">
                <button class="btn btn-primary btn-small" onclick="addAgenda()">등록</button>
            </div>
            <div id="agenda-list" class="list-container"></div>
        </div>

        <button class="btn btn-primary" onclick="switchStep(2)">회의 안건 선택 ➔</button>
        
        <div class="mt-12" style="text-align: center;">
            <button class="btn btn-outline" style="color: #ff4d4d; border-color: #ffcccc; font-size:0.8rem; padding:8px;" onclick="clearAllCache()">
                <i class="fa-solid fa-trash-can"></i> 전체 캐시 이력 초기화
            </button>
        </div>
    </div>

    <!-- [STEP 2] 안건 선택 페이지 -->
    <div id="step-select" class="hidden">
        <div class="card">
            <h2>안건 선택</h2>
            <div id="select-zone"></div>
            <div class="grid-2 mt-10">
                <button class="btn btn-outline" onclick="switchStep(1)">이전</button>
                <button class="btn btn-accent" onclick="initWriteStep()">회의 시작 ➔</button>
            </div>
        </div>
    </div>

    <!-- [STEP 3] 실시간 작성 페이지 -->
    <div id="step-write" class="hidden">
        <div class="card">
            <h2>회의 진행 기록</h2>
            <div id="write-zone"></div>
            <div class="grid-2">
                <button class="btn btn-outline" onclick="switchStep(2)">안건 변경</button>
                <button class="btn btn-primary" onclick="renderResult()">회의 종료 ➔</button>
            </div>
        </div>
    </div>

    <!-- [STEP 4] 결과 페이지 -->
    <div id="step-result" class="hidden">
        <div class="card">
            <h2>최종 회의록</h2>
            <div class="capture-wrapper" id="capture-area">
                <div class="result-view" id="result-text"></div>
            </div>
            
            <button class="btn btn-accent mt-12" style="margin-bottom:8px;" onclick="shareToSlack()">
                <i class="fa-brands fa-slack"></i> Slack으로 회의록 전송
            </button>
            
            <div class="grid-2">
                <button class="btn btn-outline" onclick="copyText()">텍스트 복사</button>
                <button class="btn btn-outline" onclick="downloadAsImage()"><i class="fa-solid fa-image"></i> 이미지로 저장</button>
            </div>
            
            <div class="grid-2 mt-10">
                <button class="btn btn-outline" onclick="switchStep(3)">◀ 내용 수정하기</button>
                <button class="btn btn-outline" style="color:red; border-color: #ffcccc;" onclick="location.reload()">새 회의 시작</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            title: "", date: "", 
            members: [], 
            agendas: ["서비스", "인력운영", "재고"],
            selected: [],
            contents: {}
        };

        window.onload = () => {
            const saved = localStorage.getItem('olive_pwa_data_v4');
            if(saved) state = JSON.parse(saved);
            renderSetup();
            
            if(!state.date) {
                const now = new Date();
                now.setHours(now.getHours() + 1);
                now.setMinutes(0);
                now.setSeconds(0);
                
                const offset = now.getTimezoneOffset() * 60000;
                const localISOTime = new Date(now.getTime() - offset).toISOString().slice(0, 16);
                document.getElementById('meet-date').value = localISOTime;
            } else {
                document.getElementById('meet-date').value = state.date;
            }
            
            document.addEventListener('input', function (e) {
                if (e.target.tagName.toLowerCase() === 'textarea' && e.target.closest('.line-input-group')) {
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                }
            });
        };

        function save() { 
            state.title = document.getElementById('meet-title').value;
            state.date = document.getElementById('meet-date').value;
            localStorage.setItem('olive_pwa_data_v4', JSON.stringify(state)); 
        }

        function clearAllCache() {
            if(confirm("기본 안건 세팅을 포함하여 등록된 참석자, 저장 기록 등 모든 데이터가 공장 초기화됩니다. 진행할까요?")) {
                localStorage.removeItem('olive_pwa_data_v4');
                location.reload();
            }
        }

        function addMember() {
            const val = document.getElementById('member-input').value.trim();
            if(val) { state.members.push(val); document.getElementById('member-input').value = ""; renderSetup(); save(); }
        }
        function delMember(idx) { state.members.splice(idx, 1); renderSetup(); save(); }

        function addAgenda() {
            const val = document.getElementById('agenda-input').value.trim();
            if(val) { state.agendas.push(val); document.getElementById('agenda-input').value = ""; renderSetup(); save(); }
        }
        function delAgenda(idx) { state.agendas.splice(idx, 1); renderSetup(); save(); }

        // [수정] 렌더링 시 Draggable 속성 부여 및 순서 정렬 이벤트 바인딩
        function renderSetup() {
            const mList = document.getElementById('member-list');
            mList.innerHTML = state.members.map((m, i) => `
                <div class="tag-item" draggable="true" data-index="${i}">
                    <i class="fa-solid fa-bars" style="color:#bbb; font-size:0.75rem;"></i> ${m} 
                    <i class="fa-solid fa-xmark" onclick="delMember(${i})"></i>
                </div>
            `).join('');
            bindDragEvents(mList, 'members', renderSetup);
            
            const aList = document.getElementById('agenda-list');
            aList.innerHTML = state.agendas.map((a, i) => `
                <div class="tag-item" draggable="true" data-index="${i}">
                    <i class="fa-solid fa-bars" style="color:#bbb; font-size:0.75rem;"></i> ${a} 
                    <i class="fa-solid fa-xmark" onclick="delAgenda(${i})"></i>
                </div>
            `).join('');
            bindDragEvents(aList, 'agendas', renderSetup);
            
            document.getElementById('meet-title').value = state.title || "";
        }

        function switchStep(n) {
            document.querySelectorAll('body > div[id^="step-"]').forEach(div => div.classList.add('hidden'));
            const ids = ['step-setup', 'step-select', 'step-write', 'step-result'];
            document.getElementById(ids[n-1]).classList.remove('hidden');
            
            for(let i=1; i<=4; i++) {
                const bar = document.getElementById(`bar-${i}`);
                if(i <= n) bar.classList.add('active');
                else bar.classList.remove('active');
            }
            
            if(n === 2) renderSelect();
            save();
            window.scrollTo(0,0);
        }

        function renderSelect() {
            const zone = document.getElementById('select-zone');
            zone.innerHTML = state.agendas.map(a => `
                <label class="select-item-label">
                    <input type="checkbox" value="${a}" ${state.selected.includes(a)?'checked':''}>
                    <span>${a}</span>
                </label>
            `).join('');
        }

        function initWriteStep() {
            const checked = document.querySelectorAll('#select-zone input:checked');
            state.selected = Array.from(checked).map(c => c.value);
            if(state.selected.length === 0) return alert("진행할 안건을 최소 하나 선택해주세요.");
            
            state.selected.forEach(a => { if(!state.contents[a]) state.contents[a] = [""]; });
            renderWriteZone();
            switchStep(3);
        }

        // [수정] 세 번째 페이지 행 단위 드래그&드롭 핸들 인터페이스 바인딩
        function renderWriteZone() {
            const zone = document.getElementById('write-zone');
            zone.innerHTML = state.selected.map(a => `
                <div class="agenda-write-card">
                    <h3>📌 ${a}</h3>
                    <div id="lines-${a}" class="lines-container" data-agenda="${a}">
                        ${state.contents[a].map((text, i) => `
                            <div class="line-input-group" draggable="true" data-index="${i}">
                                <div class="drag-handle"><i class="fa-solid fa-grip-lines"></i></div>
                                <textarea placeholder="내용을 입력하세요" oninput="updateLine('${a}', ${i}, this.value)">${text}</textarea>
                                <button class="btn-del-line" onclick="delLine('${a}', ${i})"><i class="fa-solid fa-minus"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-outline btn-small" onclick="addLine('${a}')" style="width:100%; margin-top:4px;">+ 내용 행 추가</button>
                </div>
            `).join('');

            // 각 안건 내 리스트마다 순서 변경 기능 바인딩
            document.querySelectorAll('.lines-container').forEach(container => {
                const agendaKey = container.getAttribute('data-agenda');
                bindLineDragEvents(container, agendaKey);
            });
        }

        function addLine(a) { state.contents[a].push(""); renderWriteZone(); save(); }
        function delLine(a, i) { if(state.contents[a].length > 1) { state.contents[a].splice(i, 1); renderWriteZone(); save(); } }
        function updateLine(a, i, val) { state.contents[a][i] = val; save(); }

        // [신규] 태그(참석자, 안건) 드래그 이벤트 동기화 제어 함수
        function bindDragEvents(container, stateKey, callback) {
            let draggedIdx = null;
            
            container.addEventListener('dragstart', (e) => {
                const target = e.target.closest('.tag-item');
                if(!target) return;
                draggedIdx = parseInt(target.getAttribute('data-index'));
                target.classList.add('dragging');
            });

            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                const target = e.target.closest('.tag-item');
                if (!target || target.classList.contains('dragging')) return;
                
                const bounding = target.getBoundingClientRect();
                const offset = e.clientX - bounding.left;
                if (offset > bounding.width / 2) {
                    target.after(document.querySelector('.tag-item.dragging'));
                } else {
                    target.before(document.querySelector('.tag-item.dragging'));
                }
            });

            container.addEventListener('dragend', (e) => {
                const target = e.target.closest('.tag-item');
                if(!target) return;
                target.classList.remove('dragging');
                
                // DOM 실제 배치 기준으로 배열 데이터 갱신 구조화
                const currentItems = Array.from(container.querySelectorAll('.tag-item'));
                const newOrder = currentItems.map(item => state[stateKey][parseInt(item.getAttribute('data-index'))]);
                state[stateKey] = newOrder;
                save();
                callback();
            });
        }

        // [신규] 세 번째 페이지 텍스트 영역 전용 드래그 이벤트 제어 함수
        function bindLineDragEvents(container, agendaKey) {
            container.addEventListener('dragstart', (e) => {
                const target = e.target.closest('.line-input-group');
                if(!target) return;
                target.classList.add('dragging');
            });

            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                const target = e.target.closest('.line-input-group');
                if (!target || target.classList.contains('dragging')) return;
                
                const bounding = target.getBoundingClientRect();
                const offset = e.clientY - bounding.top;
                if (offset > bounding.height / 2) {
                    target.after(document.querySelector('.line-input-group.dragging'));
                } else {
                    target.before(document.querySelector('.line-input-group.dragging'));
                }
            });

            container.addEventListener('dragend', (e) => {
                const target = e.target.closest('.line-input-group');
                if(!target) return;
                target.classList.remove('dragging');
                
                // 유저가 임의 수정한 텍스트 데이터를 DOM 배치 기준으로 안전하게 가로채 동기화
                const currentRows = Array.from(container.querySelectorAll('.line-input-group'));
                const updatedLines = currentRows.map(row => row.querySelector('textarea').value);
                
                state.contents[agendaKey] = updatedLines;
                save();
                renderWriteZone(); // 순서 갱신 후 텍스트뷰 데이터 상태 보존 리렌더링
            });
        }

        function getRawReport() {
            let res = `📝 [회의록] ${state.title || '정기 미팅'}\n`;
            res += `일시: ${document.getElementById('meet-date').value.replace('T',' ')}\n`;
            res += `참석자: ${state.members.length > 0 ? state.members.join(', ') : '-'}\n`;
            res += `--------------------------\n`;
            
            state.selected.forEach(a => {
                res += `\n📌 ${a}\n`;
                if(state.contents[a]) {
                    state.contents[a].forEach(line => { 
                        if(line.trim()) {
                            const formattedLine = line.split('\n').map((subLine, idx) => idx === 0 ? ` - ${subLine}` : `   ${subLine}`).join('\n');
                            res += `${formattedLine}\n`; 
                        }
                    });
                }
            });
            return res;
        }

        function renderResult() {
            save();
            document.getElementById('result-text').innerText = getRawReport();
            switchStep(4);
        }

        async function shareToSlack() {
            const reportText = getRawReport();
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: state.title || '회의록 전송',
                        text: reportText
                    });
                } catch (err) {
                    console.log('공유 취소 또는 에러:', err);
                }
            } else {
                navigator.clipboard.writeText(reportText);
                alert("현재 브라우저 환경이 시스템 공유 기능을 지원하지 않아 회의록을 클립보드에 바로 복사해드렸습니다! Slack 창에 붙여넣기(Ctrl+V) 해주세요.");
            }
        }

        function copyText() { navigator.clipboard.writeText(getRawReport()); alert("클립보드에 복사되었습니다."); }
        
        function downloadAsImage() {
            const target = document.getElementById('capture-area');
            html2canvas(target, {
                scale: 2, 
                backgroundColor: document.documentElement.getAttribute('data-theme') === 'dark' ? '#1e1e1b' : '#ffffff',
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `회의록_${state.title || '미팅데이터'}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => {
                alert('이미지 생성에 실패했습니다. 다시 시도해 주세요.');
                console.error(err);
            });
        }

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }
    </script>
</body>
</html>
